<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Daily Knowledge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --primary: #6366f1; --secondary: #8b5cf6; --accent: #f472b6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; 
            --dark: #0f172a; --dark2: #1e293b; --dark3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
        }
        html, body { height: 100%; }
        body { font-family: 'Prompt', sans-serif; background: var(--dark); color: var(--text); overflow: hidden; }
        
        /* App */
        .app { height: 100%; display: flex; flex-direction: column; }
        
        /* Hero - Beautiful gradient */
        .hero { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            padding: 35px 20px 25px; text-align: center; flex-shrink: 0; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -30%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 50%);
            animation: shimmer 6s ease-in-out infinite;
        }
        @keyframes shimmer { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10%, 10%); } }
        
        .hero-content { position: relative; z-index: 1; }
        .hero-icon { 
            width: 75px; height: 75px; margin: 0 auto 14px; 
            background: rgba(255,255,255,0.2); border-radius: 22px; 
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 3px solid rgba(255,255,255,0.35);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }
        .hero-icon svg { width: 45px; height: 45px; }
        .hero h1 { font-size: 1.6rem; font-weight: 700; text-shadow: 0 3px 12px rgba(0,0,0,0.35); margin-bottom: 4px; }
        .hero p { font-size: 0.9rem; opacity: 0.95; font-weight: 400; }
        .hero .date { 
            display: inline-block; margin-top: 12px; padding: 6px 16px; 
            background: rgba(255,255,255,0.25); border-radius: 20px; 
            font-size: 0.78rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.35);
        }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 18px; padding-bottom: 95px; }
        
        /* Section */
        .section { margin-bottom: 24px; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
        
        /* Cards - Beautiful */
        .card { 
            background: linear-gradient(150deg, var(--dark2), var(--dark3)); 
            border-radius: 18px; padding: 18px; margin-bottom: 14px; 
            border-left: 5px solid var(--primary); transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .card .tag { 
            display: inline-block; padding: 5px 14px; background: var(--primary); 
            border-radius: 14px; font-size: 0.68rem; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .card .meta { font-size: 0.78rem; color: var(--text2); }
        
        /* Category Colors */
        .card.oc { border-left-color: #6366f1; }
        .card.oc .tag { background: #6366f1; }
        .card.ai { border-left-color: #ec4899; }
        .card.ai .tag { background: #ec4899; }
        .card.tech { border-left-color: #06b6d4; }
        .card.tech .tag { background: #06b6d4; }
        .card.trade { border-left-color: #10b981; }
        .card.trade .tag { background: #10b981; }
        .card.meet { border-left-color: #f59e0b; }
        .card.meet .tag { background: #f59e0b; }
        
        /* Status */
        .ok { color: var(--success); }
        .err { color: var(--danger); }
        .off { color: var(--text2); }
        
        /* Nav */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px);
            display: flex; padding: 10px 15px 28px; border-top: 1px solid var(--dark3); 
        }
        .nav-item { flex: 1; text-align: center; padding: 10px; opacity: 0.5; transition: 0.2s; border-radius: 14px; }
        .nav-item:active { opacity: 1; }
        .nav-item.active { opacity: 1; }
        .nav-item .icon { font-size: 24px; display: block; margin-bottom: 3px; }
        .nav-item span { font-size: 0.72rem; font-weight: 600; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 100; overflow-y: auto; }
        .modal.show { display: block; }
        .modal-content { padding: 22px; max-width: 520px; margin: 0 auto; }
        .modal-close { position: fixed; top: 16px; right: 16px; width: 38px; height: 38px; background: var(--dark2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .modal h2 { font-size: 1.35rem; margin-bottom: 10px; }
        .modal .meta { font-size: 0.82rem; color: var(--text2); margin-bottom: 18px; }
        .modal .body { font-size: 0.98rem; line-height: 1.8; }
        .modal .body p { margin-bottom: 14px; }
        .back { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.92rem; margin-bottom: 16px; }
        
        /* Icon in card */
        .card-icon { font-size: 1.3rem; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="hero">
            <div class="hero-content">
                <div class="hero-icon">
                    <svg viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="url(#g)"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white">🦞</text></svg>
                </div>
                <h1>Daily Knowledge</h1>
                <p>ความรู้ใหม่ทุกวัน</p>
                <div class="date" id="date"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <nav class="nav">
            <div class="nav-item active" data-page="home"><span class="icon">🏠</span><span>หน้าหลัก</span></div>
            <div class="nav-item" data-page="learn"><span class="icon">📚</span><span>เรียนรู้</span></div>
            <div class="nav-item" data-page="cron"><span class="icon">⏰</span><span>งาน</span></div>
            <div class="nav-item" data-page="team"><span class="icon">👥</span><span>ทีม</span></div>
        </nav>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-close" onclick="closeModal()">✕</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const content = document.getElementById('content');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        
        document.getElementById('date').textContent = new Date().toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
        
        const data = {
            openclaw: [
                {title: "OpenClaw v2026.3.2", icon: "🦞", cat: "oc", content: "<p><strong>🎉 อัปเดตล่าสุด!</strong></p><p>• <strong>PDF Analysis Tool</strong> - วิเคราะห์ PDF ได้เลย</p><p>• <strong>150+ Bug Fixes</strong> - แก้บักมากมาย</p><p>• <strong>Secrets/SecretRef</strong> - รองรับ 64 targets</p>"},
                {title: "วิธีใช้ Minimax", icon: "🤖", cat: "oc", content: "<p><strong>Minimax</strong> คือโมเดล AI หลักที่ Jarvis ใช้</p><p><strong>✓ ข้อดี:</strong> ราคาถูก, ตอบเร็ว, ภาษาไทยดี</p><p><strong>📊 Model:</strong> M2.5=งานทั่วไป, M2.1=เขียนโค้ด</p>"},
                {title: "Cron Jobs", icon: "⏰", cat: "oc", content: "<p>Cron Jobs = ตารางงานอัตโนมัติ</p><p><strong>งานหลัก:</strong></p><p>• Morning Brief 07:00</p><p>• Midday Insight 10:00</p><p>• Evening Wrap 19:00</p>"}
            ],
            ai: [
                {title: "AI Agents คือ?", icon: "🤖", cat: "ai", content: "<p><strong>🤖 AI Agents</strong> คือ AI ที่ทำงานแทนเราได้อัตโนมัติ</p><p><strong>💡 ตัวอย่าง:</strong> หาข่าว, ทำรายงาน, จัดการงาน</p><p><strong>🔮 อนาคต:</strong> จะมีบทบาทสำคัญมาก</p>"},
                {title: "Claude vs GPT vs Gemini", icon: "🧠", cat: "ai", content: "<p><strong>🔵 Claude:</strong> เน้นความปลอดภัย</p><p><strong>🟢 GPT:</strong> ใช้ง่าย มี Plugins</p><p><strong>🟣 Gemini:</strong> เน้น Multimodal</p>"}
            ],
            tech: [
                {title: "Windows Server vs 10", icon: "💻", cat: "tech", content: "<p><strong>🖥️ Server 2022:</strong> เสถียรสูง รัน 24/7</p><p><strong>🖥️ Windows 10/11:</strong> ใช้ง่าย ถูกกว่า</p>"},
                {title: "Obsidian", icon: "📝", cat: "tech", content: "<p><strong>📝 App เขียนโน้ต</strong> + จัดการความรู้</p><p>เน้น Text + เชื่อมโยงความคิด</p><p>ฟรีสำหรับใช้งานส่วนตัว!</p>"}
            ],
            trading: [
                {title: "Windows + MT5 + FTMO", icon: "📈", cat: "trade", content: "<p><strong>✅ ใช้ได้!</strong></p><p>Server 2022 รัน MT5 เทรด FTMO ได้เลย</p><p><strong>📋 ความต้องการ:</strong> RAM 4GB+, CPU 2 cores+</p><p><strong>⚠️ หมายเหตุ:</strong> Windows 7 ไม่รองรับ MT5 แล้ว!</p>"}
            ],
            meeting: [
                {title: "Knowledge App", icon: "📱", cat: "meet", content: "<p><strong>🎯 สร้าง App</strong> สำหรับดูความรู้ใหม่ทุกวัน</p><p><strong>✅ ทำแล้ว:</strong> HTML/CSS/JS, GitHub Pages</p><p><strong>📱 Link:</strong> basssg.github.io/daily-knowledge</p>"},
                {title: "Task Tracker", icon: "📋", cat: "meet", content: "<p><strong>Google Sheet:</strong> Jarvis Task Tracker</p><p><strong>ID:</strong> 1sJKYdfkBPoHg4LC5ZMp0NxHy5ffcEjN25CSpevogK8s</p><p><strong>Tabs:</strong> Summary, In Progress, Completed</p>"}
            ]
        };
        
        // Render Home - Beautiful
        function renderHome() {
            content.innerHTML = `
                <div class="section">
                    <div class="section-title">🦞 OpenClaw</div>
                    ${data.openclaw.slice(0,1).map(i => card(i, 'openclaw')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">🤖 AI ล่าสุด</div>
                    ${data.ai.slice(0,1).map(i => card(i, 'ai')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">💻 Tech</div>
                    ${data.tech.slice(0,1).map(i => card(i, 'tech')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📈 Trading</div>
                    ${data.trading.slice(0,1).map(i => card(i, 'trade')).join('')}
                </div>
            `;
        }
        
        // Render Learn - All
        function renderLearn() {
            content.innerHTML = `
                <div class="section">
                    <div class="section-title">🦞 OpenClaw</div>
                    ${data.openclaw.map(i => card(i, 'openclaw')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">🤖 AI</div>
                    ${data.ai.map(i => card(i, 'ai')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">💻 Tech</div>
                    ${data.tech.map(i => card(i, 'tech')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📈 Trading</div>
                    ${data.trading.map(i => card(i, 'trade')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📋 การประชุม</div>
                    ${data.meeting.map(i => card(i, 'meet')).join('')}
                </div>
            `;
        }
        
        // Render Cron
        function renderCron() {
            const jobs = [
                {name: "Morning Brief", time: "07:00", status: "ok", icon: "🌅"},
                {name: "Midday Insight", time: "10:00", status: "ok", icon: "☀️"},
                {name: "Evening Wrap", time: "19:00", status: "ok", icon: "🌆"},
                {name: "Daily News", time: "06:30", status: "ok", icon: "📰"},
                {name: "Backup", time: "ทุก 8 ชม.", status: "ok", icon: "💾"},
                {name: "Price Alert", time: "ทุกชม.", status: "off", icon: "🔔"}
            ];
            
            content.innerHTML = `
                <div class="section">
                    <div class="section-title">⏰ ตารางงาน</div>
                    ${jobs.map(j => `
                        <div class="card oc">
                            <div class="card-icon">${j.icon}</div>
                            <h3>${j.name}</h3>
                            <div class="meta">🕐 ${j.time} &nbsp;|&nbsp; <span class="${j.status === 'ok' ? 'ok' : 'off'}">${j.status === 'ok' ? '✅ ทำงาน' : '⛔ ปิด'}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Render Team
        function renderTeam() {
            const history = [
                {job: "Morning Brief", time: "07:00", status: "ok", result: "XAUUSD $5,171", icon: "🌅"},
                {job: "Evening Wrap", time: "19:00", status: "ok", result: "สรุปตลาด", icon: "🌆"},
                {job: "News Focus", time: "14:00", status: "err", result: "❌ Failed", icon: "📰"},
                {job: "Backup", time: "03:00", status: "ok", result: "เสร็จ", icon: "💾"}
            ];
            
            content.innerHTML = `
                <div class="section">
                    <div class="section-title">📋 การประชุม</div>
                    ${data.meeting.map(i => card(i, 'meet')).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📊 ประวัติงาน</div>
                    ${history.map(h => `
                        <div class="card oc">
                            <div class="card-icon">${h.icon}</div>
                            <h3>${h.job}</h3>
                            <div class="meta">🕐 ${h.time} &nbsp;|&nbsp; <span class="${h.status === 'ok' ? 'ok' : 'err'}">${h.status === 'ok' ? '✅' : '❌'}</span> ${h.result}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function card(item, cat) {
            return `<div class="card ${cat}" onclick="show('${cat}', '${item.title.replace(/'/g, "\\'")}')">
                <span class="tag">${item.icon} ${item.title}</span>
                <div class="meta" style="margin-top:8px">คลิกเพื่ออ่าน →</div>
            </div>`;
        }
        
        function show(cat, title) {
            const item = data[cat]?.find(i => i.title === title);
            if (!item) return;
            modalContent.innerHTML = `<h2>${item.icon} ${item.title}</h2><div class="body">${item.content}</div>`;
            modal.classList.add('show');
        }
        
        function closeModal() { modal.classList.remove('show'); }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const p = this.dataset.page;
                if (p === 'home') renderHome();
                else if (p === 'learn') renderLearn();
                else if (p === 'cron') renderCron();
                else if (p === 'team') renderTeam();
            });
        });
        
        renderHome();
    </script>
</body>
</html>
