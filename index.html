<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Daily Knowledge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --primary: #6366f1; --secondary: #8b5cf6; --accent: #f472b6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; 
            --dark: #0f172a; --dark2: #1e293b; --dark3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
        }
        html, body { height: 100%; }
        body { font-family: 'Prompt', sans-serif; background: var(--dark); color: var(--text); overflow: hidden; }
        
        /* App Container */
        .app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header - Different colors per page */
        .header { padding: 25px 20px; text-align: center; flex-shrink: 0; transition: 0.3s; }
        .header.home { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .header.learn { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .header.cron { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .header.team { background: linear-gradient(135deg, #10b981, #34d399); }
        
        .header-icon { 
            width: 60px; height: 60px; margin: 0 auto 10px; 
            background: rgba(255,255,255,0.2); border-radius: 18px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .header-icon svg { width: 36px; height: 36px; }
        .header h1 { font-size: 1.4rem; font-weight: 700; }
        .header .date { display: inline-block; margin-top: 8px; padding: 4px 12px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 0.75rem; }
        
        /* Scroll */
        .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 15px; padding-bottom: 90px; }
        
        /* Section */
        .section { margin-bottom: 24px; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        
        /* Cards */
        .card { 
            background: var(--dark2); border-radius: 16px; padding: 16px; margin-bottom: 12px; 
            border-left: 4px solid var(--primary); transition: 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card .tag { display: inline-block; padding: 4px 12px; background: var(--primary); border-radius: 12px; font-size: 0.65rem; font-weight: 600; margin-bottom: 10px; }
        .card h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 6px; }
        .card .meta { font-size: 0.75rem; color: var(--text2); }
        
        /* Colors per category */
        .card.oc { border-left-color: #6366f1; }
        .card.oc .tag { background: #6366f1; }
        .card.ai { border-left-color: #ec4899; }
        .card.ai .tag { background: #ec4899; }
        .card.tech { border-left-color: #06b6d4; }
        .card.tech .tag { background: #06b6d4; }
        .card.trade { border-left-color: #10b981; }
        .card.trade .tag { background: #10b981; }
        .card.meet { border-left-color: #f59e0b; }
        .card.meet .tag { background: #f59e0b; }
        
        /* Status */
        .ok { color: var(--success); }
        .err { color: var(--danger); }
        .off { color: var(--text2); }
        
        /* Bottom Nav */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            display: flex; padding: 8px 10px 25px; border-top: 1px solid var(--dark3); 
        }
        .nav-item { flex: 1; text-align: center; padding: 8px; opacity: 0.5; transition: 0.2s; border-radius: 12px; }
        .nav-item:active { opacity: 1; }
        .nav-item.active { opacity: 1; }
        .nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; overflow-y: auto; }
        .modal.show { display: block; }
        .modal-content { padding: 20px; max-width: 500px; margin: 0 auto; }
        .modal-close { position: fixed; top: 15px; right: 15px; width: 36px; height: 36px; background: var(--dark2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .modal .meta { font-size: 0.8rem; color: var(--text2); margin-bottom: 15px; }
        .modal .body { font-size: 0.95rem; line-height: 1.7; }
        .modal .body p { margin-bottom: 12px; }
        .back { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.9rem; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header home" id="header">
            <div class="header-icon"><svg viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="url(#g)"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white">🦞</text></svg></div>
            <h1 id="headerTitle">Daily Knowledge</h1>
            <div class="date" id="date"></div>
        </div>
        
        <div class="scroll" id="scroll"></div>
        
        <nav class="nav">
            <div class="nav-item active" data-page="home"><span class="icon">🏠</span><span>หน้าหลัก</span></div>
            <div class="nav-item" data-page="learn"><span class="icon">📚</span><span>เรียนรู้</span></div>
            <div class="nav-item" data-page="cron"><span class="icon">⏰</span><span>งาน</span></div>
            <div class="nav-item" data-page="team"><span class="icon">👥</span><span>ทีม</span></div>
        </nav>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-close" onclick="closeModal()">✕</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const header = document.getElementById('header');
        const headerTitle = document.getElementById('headerTitle');
        const scroll = document.getElementById('scroll');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        
        document.getElementById('date').textContent = new Date().toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
        
        const data = {
            openclaw: [
                {title: "OpenClaw v2026.3.2", cat: "oc", content: "<p><strong>🎉 อัปเดตล่าสุด!</strong></p><p>• PDF Analysis Tool - วิเคราะห์ PDF ได้</p><p>• 150+ Bug Fixes</p><p>• Secrets/SecretRef 64 targets</p>"},
                {title: "วิธีใช้ Minimax", cat: "oc", content: "<p><strong>Minimax</strong> คือโมเดล AI หลักที่ Jarvis ใช้</p><p><strong>✓ ข้อดี:</strong> ราคาถูก, ตอบเร็ว, ภาษาไทยดี</p><p><strong>📊 Model:</strong> M2.5=งานทั่วไป, M2.1=เขียนโค้ด</p>"},
                {title: "Cron Jobs คือ?", cat: "oc", content: "<p>Cron Jobs = ตารางงานอัตโนมัติ</p><p><strong>งานหลัก:</strong></p><p>• Morning Brief 07:00</p><p>• Midday Insight 10:00</p><p>• Evening Wrap 19:00</p>"}
            ],
            ai: [
                {title: "AI Agents คืออะไร?", cat: "ai", content: "<p><strong>🤖 AI Agents</strong> คือ AI ที่ทำงานแทนเราได้อัตโนมัติ</p><p><strong>💡 ตัวอย่าง:</strong> หาข่าว, ทำรายงาน, จัดการงาน</p>"},
                {title: "Claude vs GPT vs Gemini", cat: "ai", content: "<p><strong>🔵 Claude:</strong> ความปลอดภัย</p><p><strong>🟢 GPT:</strong> ใช้ง่าย</p><p><strong>🟣 Gemini:</strong> Multimodal</p>"}
            ],
            tech: [
                {title: "Windows Server vs 10", cat: "tech", content: "<p><strong>Server 2022:</strong> เสถียรสูง รัน 24/7</p><p><strong>Windows 10/11:</strong> ใช้ง่าย ถูกกว่า</p>"},
                {title: "Obsidian", cat: "tech", content: "<p><strong>📝 App เขียนโน้ต</strong></p><p>เน้น Text + เชื่อมโยงความคิด</p><p>ฟรีสำหรับใช้งานส่วนตัว!</p>"}
            ],
            trading: [
                {title: "Windows + MT5 + FTMO", cat: "trade", content: "<p><strong>✅ ใช้ได้!</strong></p><p>Server 2022 รัน MT5 เทรด FTMO ได้</p><p><strong>ความต้องการ:</strong> RAM 4GB+, CPU 2 cores+</p>"}
            ],
            meeting: [
                {title: "Knowledge App", cat: "meet", content: "<p><strong>🎯 สร้าง App</strong> สำหรับดูความรู้</p><p><strong>✅ ทำแล้ว:</strong> HTML/CSS/JS, GitHub Pages</p><p><strong>📱</strong> basssg.github.io/daily-knowledge</p>"},
                {title: "Task Tracker", cat: "meet", content: "<p><strong>Google Sheet:</strong> Jarvis Task Tracker</p><p><strong>ID:</strong> 1sJKYdfkBPoHg4LC5ZMp0NxHy5ffcEjN25CSpevogK8s</p><p><strong>Tabs:</strong> Summary, In Progress, Completed</p>"}
            ]
        };
        
        const pageInfo = {
            home: { title: "⚡ แนะนำ", color: "home", icon: "🦞" },
            learn: { title: "📚 หมวดหมู่", color: "learn", icon: "📚" },
            cron: { title: "⏰ ตารางงาน", color: "cron", icon: "⏰" },
            team: { title: "👥 ทีม & ประวัติ", color: "team", icon: "👥" }
        };
        
        // Render Home
        function renderHome() {
            setHeader('home');
            scroll.innerHTML = `
                <div class="section">
                    <div class="section-title">⚡ แนะนำวันนี้</div>
                    ${renderCard('openclaw', data.openclaw[0])}
                    ${renderCard('ai', data.ai[0])}
                </div>
                <div class="section">
                    <div class="section-title">📈 Trading</div>
                    ${renderCard('trading', data.trading[0])}
                </div>
                <div class="section">
                    <div class="section-title">💻 Tech</div>
                    ${renderCard('tech', data.tech[0])}
                </div>
            `;
        }
        
        // Render Learn
        function renderLearn() {
            setHeader('learn');
            scroll.innerHTML = `
                <div class="section">
                    <div class="section-title">🦞 OpenClaw</div>
                    ${data.openclaw.map(i => renderCard('openclaw', i)).join('')}
                </div>
                <div class="section">
                    <div class="section-title">🤖 AI</div>
                    ${data.ai.map(i => renderCard('ai', i)).join('')}
                </div>
                <div class="section">
                    <div class="section-title">💻 Tech</div>
                    ${data.tech.map(i => renderCard('tech', i)).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📈 Trading</div>
                    ${data.trading.map(i => renderCard('trade', i)).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📋 การประชุม</div>
                    ${data.meeting.map(i => renderCard('meet', i)).join('')}
                </div>
            `;
        }
        
        // Render Cron
        function renderCron() {
            setHeader('cron');
            const jobs = [
                {name: "Morning Brief", time: "07:00", status: "ok"},
                {name: "Midday Insight", time: "10:00", status: "ok"},
                {name: "Evening Wrap", time: "19:00", status: "ok"},
                {name: "Daily News", time: "06:30", status: "ok"},
                {name: "Backup", time: "ทุก 8 ชม.", status: "ok"},
                {name: "Price Alert", time: "ทุกชม.", status: "off"}
            ];
            
            scroll.innerHTML = `
                <div class="section">
                    <div class="section-title">⏰ Cron Jobs</div>
                    ${jobs.map(j => `
                        <div class="card oc">
                            <div class="meta" style="margin-bottom:4px">🕐 ${j.time}</div>
                            <h3>${j.name}</h3>
                            <div class="meta"><span class="${j.status === 'ok' ? 'ok' : 'off'}">${j.status === 'ok' ? '✅ ทำงาน' : '⛔ ปิด'}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Render Team
        function renderTeam() {
            setHeader('team');
            const history = [
                {job: "Morning Brief", time: "07:00", status: "ok", result: "XAUUSD $5,171"},
                {job: "Evening Wrap", time: "19:00", status: "ok", result: "สรุปตลาด"},
                {job: "News Focus", time: "14:00", status: "err", result: "❌ Failed"},
                {job: "Backup", time: "03:00", status: "ok", result: "เสร็จ"}
            ];
            
            scroll.innerHTML = `
                <div class="section">
                    <div class="section-title">📋 การประชุมล่าสุด</div>
                    ${data.meeting.map(i => renderCard('meet', i)).join('')}
                </div>
                <div class="section">
                    <div class="section-title">📊 ประวัติงาน</div>
                    ${history.map(h => `
                        <div class="card oc">
                            <div class="meta">🕐 ${h.time}</div>
                            <h3>${h.job}</h3>
                            <div class="meta"><span class="${h.status === 'ok' ? 'ok' : 'err'}">${h.status === 'ok' ? '✅' : '❌'}</span> ${h.result}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function setHeader(page) {
            header.className = 'header ' + pageInfo[page].color;
            headerTitle.textContent = pageInfo[page].title;
        }
        
        function renderCard(cat, item) {
            return `<div class="card ${cat}" onclick="showModal('${cat}', '${item.title.replace(/'/g, "\\'")}')">
                <span class="tag">${item.title}</span>
                <div class="meta">คลิกเพื่ออ่าน →</div>
            </div>`;
        }
        
        function showModal(cat, title) {
            const item = data[cat]?.find(i => i.title === title);
            if (!item) return;
            modalContent.innerHTML = `<h2>${item.title}</h2><div class="body">${item.content}</div>`;
            modal.classList.add('show');
        }
        
        function closeModal() { modal.classList.remove('show'); }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const page = this.dataset.page;
                if (page === 'home') renderHome();
                else if (page === 'learn') renderLearn();
                else if (page === 'cron') renderCron();
                else if (page === 'team') renderTeam();
            });
        });
        
        renderHome();
    </script>
</body>
</html>
