<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Daily Knowledge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --primary: #6366f1; --primary2: #4f46e5; --secondary: #8b5cf6; 
            --accent: #f472b6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; 
            --dark: #0f172a; --dark2: #1e293b; --dark3: #334155; --dark4: #475569;
            --text: #f8fafc; --text2: #94a3b8; --text3: #64748b;
        }
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Prompt', sans-serif; background: var(--dark); color: var(--text); }
        
        /* Hero */
        .hero { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%); 
            padding: 30px 20px; text-align: center; position: relative; overflow: hidden; 
        }
        .hero::before { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1) 0%, transparent 50%);
        }
        .hero-content { position: relative; z-index: 1; }
        .hero-icon { 
            width: 70px; height: 70px; margin: 0 auto 12px; 
            background: rgba(255,255,255,0.2); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .hero-icon svg { width: 40px; height: 40px; }
        .hero h1 { font-size: 1.5rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.3); margin-bottom: 4px; }
        .hero p { font-size: 0.85rem; opacity: 0.95; }
        .hero .date { 
            display: inline-block; margin-top: 10px; padding: 5px 14px; 
            background: rgba(255,255,255,0.2); border-radius: 20px; 
            font-size: 0.75rem; font-weight: 500; 
        }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        
        /* Section */
        .section { margin-bottom: 24px; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .section-header .icon { font-size: 20px; }
        .section-header h2 { font-size: 1.1rem; font-weight: 600; flex: 1; }
        
        /* Menu */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
        .menu-item { 
            background: var(--dark2); border-radius: 14px; padding: 14px 8px; 
            text-align: center; transition: 0.2s; border: 1px solid transparent; 
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item.active { border-color: var(--primary); background: var(--dark3); }
        .menu-item .icon { font-size: 22px; margin-bottom: 6px; }
        .menu-item .label { font-size: 0.7rem; font-weight: 500; }
        
        /* Cards */
        .card { 
            background: linear-gradient(145deg, var(--dark2), var(--dark3)); 
            border-radius: 16px; padding: 16px; margin-bottom: 12px; 
            border-left: 4px solid var(--primary); transition: 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card .tag { 
            display: inline-block; padding: 4px 12px; background: var(--primary); 
            border-radius: 12px; font-size: 0.65rem; font-weight: 600; margin-bottom: 10px; text-transform: uppercase;
        }
        .card h3 { font-size: 0.95rem; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
        .card .meta { font-size: 0.75rem; color: var(--text2); display: flex; align-items: center; gap: 8px; }
        
        /* Colors */
        .card[data-cat="openclaw"] { border-left-color: #6366f1; }
        .card[data-cat="openclaw"] .tag { background: #6366f1; }
        .card[data-cat="ai"] { border-left-color: #ec4899; }
        .card[data-cat="ai"] .tag { background: #ec4899; }
        .card[data-cat="tech"] { border-left-color: #06b6d4; }
        .card[data-cat="tech"] .tag { background: #06b6d4; }
        .card[data-cat="trading"] { border-left-color: #10b981; }
        .card[data-cat="trading"] .tag { background: #10b981; }
        .card[data-cat="meeting"] { border-left-color: #f59e0b; }
        .card[data-cat="meeting"] .tag { background: #f59e0b; }
        
        /* Status */
        .status-ok { color: var(--success); }
        .status-err { color: var(--danger); }
        .status-off { color: var(--text3); }
        
        /* Bottom Nav */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            display: flex; padding: 8px 12px 28px; border-top: 1px solid var(--dark3); 
        }
        .nav-item { flex: 1; text-align: center; padding: 10px; opacity: 0.5; transition: 0.2s; border-radius: 12px; }
        .nav-item:active { opacity: 1; background: rgba(99, 102, 241, 0.15); }
        .nav-item.active { opacity: 1; }
        .nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; overflow-y: auto; }
        .modal.show { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { padding: 20px; max-width: 500px; margin: 0 auto; }
        .modal-close { 
            position: fixed; top: 15px; right: 15px; width: 36px; height: 36px; 
            background: var(--dark2); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1rem; z-index: 101;
        }
        .modal h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .modal .meta { font-size: 0.8rem; color: var(--text2); margin-bottom: 16px; }
        .modal .body { font-size: 0.95rem; line-height: 1.75; }
        .modal .body p { margin-bottom: 14px; }
        
        .back { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.9rem; margin-bottom: 14px; }
        
        /* Empty */
        .empty { text-align: center; padding: 50px 20px; color: var(--text2); }
        .empty .icon { font-size: 50px; margin-bottom: 15px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <div class="hero-icon">
                <svg viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="url(#g)"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white">🦞</text></svg>
            </div>
            <h1>Daily Knowledge</h1>
            <p>ความรู้ใหม่ทุกวัน</p>
            <div class="date" id="date"></div>
        </div>
    </div>
    
    <div class="content" id="content"></div>
    
    <nav class="nav">
        <div class="nav-item active" data-page="home"><span class="icon">🏠</span><span>หน้าหลัก</span></div>
        <div class="nav-item" data-page="learn"><span class="icon">📚</span><span>เรียนรู้</span></div>
        <div class="nav-item" data-page="cron"><span class="icon">⏰</span><span>งาน</span></div>
        <div class="nav-item" data-page="team"><span class="icon">👥</span><span>ทีม</span></div>
    </nav>
    
    <div class="modal" id="modal">
        <div class="modal-close" onclick="closeModal()">✕</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const dateEl = document.getElementById('date');
        const contentEl = document.getElementById('content');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        
        dateEl.textContent = new Date().toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        // ความรู้ที่สกัดจากการประชุม
        const knowledge = {
            openclaw: [
                {title: "OpenClaw v2026.3.2", date: "5 มี.ค. 2026", content: "<p><strong>🎉 อัปเดตล่าสุด!</strong></p><p>• <strong>PDF Analysis Tool</strong> - วิเคราะห์ PDF ได้เลย</p><p>• <strong>150+ Bug Fixes</strong> - แก้บักมากมาย</p><p>• <strong>Secrets/SecretRef</strong> - รองรับ 64 targets</p>"},
                {title: "วิธีใช้ Minimax Models", date: "4 มี.ค. 2026", content: "<p><strong>Minimax</strong> คือโมเดล AI หลักที่ Jarvis ใช้</p><p><strong>✓ ข้อดี:</strong><br>• ราคาถูก<br>• ตอบเร็ว<br>• รองรับภาษาไทยดี</p><p><strong>📊 Model Tiers:</strong><br>• M2.5 - งานทั่วไป<br>• M2.1 - เขียนโค้ด</p>"},
                {title: "การตั้งค่า Cron Jobs", date: "4 มี.ค. 2026", content: "<p>Cron Jobs คือตารางงานอัตโนมัติ</p><p><strong>งานหลัก:</strong><br>• Morning Brief 07:00<br>• Midday Insight 10:00<br>• Evening Wrap 19:00<br>• Daily News 06:30</p><p><strong>ปิด:</strong> Price Alert (ทุกชั่วโมง)</p>"}
            ],
            ai: [
                {title: "AI Agents คืออะไร?", date: "5 มี.ค. 2026", content: "<p><strong>🤖 AI Agents</strong> คือ AI ที่ทำงานแทนเราได้อัตโนมัติ</p><p><strong>💡 ตัวอย่าง:</strong><br>• สั่งให้หาข่าวและสรุป<br>• ทำรายงานอัตโนมัติ<br>• จัดการงานแทน</p><p><strong>🔮 อนาคต</strong> - จะมีบทบาทสำคัญมากในชีวิตประจำวัน</p>"},
                {title: "Claude vs GPT vs Gemini", date: "3 มี.ค. 2026", content: "<p><strong>🔵 Claude</strong> (Anthropic)<br>• เน้นความปลอดภัย<br>• เหมาะกับงานวิเคราะห์</p><p><strong>🟢 GPT</strong> (OpenAI)<br>• ใช้งานง่าย<br>• มี Plugins ให้เลือกมาก</p><p><strong>🟣 Gemini</strong> (Google)<br>• เน้น Multimodal<br>• ผสมผสาน Google Services</p>"}
            ],
            tech: [
                {title: "Windows Server 2022 vs 10", date: "4 มี.ค. 2026", content: "<p><strong>🖥️ Windows Server 2022</strong><br>• เหมาะกับ: VPS, รัน 24/7<br>• ข้อดี: เสถียรสูง<br>• ข้อเสีย: แพง</p><p><strong>🖥️ Windows 10/11</strong><br>• เหมาะกับ: ใช้งานทั่วไป<br>• ข้อดี: ถูกกว่า ใช้ง่าย</p>"},
                {title: "Obsidian: Second Brain", date: "4 มี.ค. 2026", content: "<p><strong>📝 Obsidian</strong> คือ App เขียนโน้ตและจัดการความรู้</p><p><strong>✨ ฟีเจอร์เด่น:</strong><br>• เขียนด้วย Markdown<br>• เชื่อมโยงโน้ตเข้าด้วยกัน<br>• ปรับแต่งได้เยอะ (Plugin)</p><p><strong>💰 ราคา:</strong> ฟรีสำหรับใช้งานส่วนตัว!</p>"}
            ],
            trading: [
                {title: "Windows Server + MT5 + FTMO", date: "4 มี.ค. 2026", content: "<p><strong>✅ สรุป: ใช้ได้!</strong></p><p>Windows Server 2022 สามารถรัน MT5 และเทรดกับ FTMO ได้เลย</p><p><strong>📋 ความต้องการ:</strong><br>• OS: Windows 10/11/Server 2019/2022 (64-bit)<br>• RAM: 4 GB ขึ้นไป (แนะนำ 8GB)<br>• CPU: 2 cores ขึ้นไป</p><p><strong>⚠️ หมายเหตุ:</strong> Windows 7 ไม่รองรับ MT5 แล้ว!</p>"}
            ],
            meeting: [
                {title: "สร้าง Knowledge App", date: "5 มี.ค. 2026", content: "<p><strong>🎯 วัตถุประสงค์:</strong><br>สร้าง App สำหรับดูความรู้ใหม่ทุกวัน</p><p><strong>✅ สิ่งที่ทำ:</strong><br>• สร้าง Web App ด้วย HTML/CSS/JS<br>• Deploy ขึ้น GitHub Pages<br>• เพิ่ม Cron Jobs<br>• เพิ่มหมวดหมู่ต่างๆ</p><p><strong>📱 Link:</strong> basssg.github.io/daily-knowledge</p>"},
                {title: "ระบบ Task Tracker", date: "4 มี.ค. 2026", content: "<p><strong>🎯 วัตถุประสงค์:</strong><br>บันทึกการสั่งงานและการประชุม</p><p><strong>✅ สิ่งที่ทำ:</strong><br>• สร้าง Google Sheet: Jarvis Task Tracker<br>• ID: 1sJKYdfkBPoHg4LC5ZMp0NxHy5ffcEjN25CSpevogK8s<br>• มี 3 Tabs: Summary, In Progress, Completed</p>"}
            ]
        };
        
        const typeNames = {
            openclaw: '🦞 OpenClaw', 
            ai: '🤖 AI', 
            tech: '💻 Tech', 
            trading: '📈 Trading',
            meeting: '📋 การประชุม'
        };
        
        // Render Home
        function renderHome() {
            let html = `
                <div class="section">
                    <div class="section-header"><span class="icon">⚡</span><h2>ความรู้แนะนำ</h2></div>
            `;
            
            const all = [
                ...knowledge.openclaw.slice(0,1),
                ...knowledge.ai.slice(0,1),
                ...knowledge.tech.slice(0,1),
                ...knowledge.trading.slice(0,1)
            ];
            
            all.forEach(item => {
                const cat = Object.keys(knowledge).find(k => knowledge[k].find(i => i.title === item.title));
                html += renderCard(cat, item);
            });
            html += '</div>';
            contentEl.innerHTML = html;
        }
        
        function renderCard(cat, item) {
            return `<div class="card" data-cat="${cat}" onclick="showArticle('${cat}', '${item.title.replace(/'/g, "\\'")}')">
                <span class="tag">${typeNames[cat]}</span>
                <h3>${item.title}</h3>
                <div class="meta">${item.date}</div>
            </div>`;
        }
        
        // Render Learn
        function renderLearn() {
            let html = `<div class="section"><div class="section-header"><span class="icon">📚</span><h2>หมวดหมู่ความรู้</h2></div>`;
            
            Object.keys(knowledge).forEach(cat => {
                const count = knowledge[cat].length;
                html += `<div class="card" data-cat="${cat}" onclick="renderCategory('${cat}')">
                    <span class="tag">${typeNames[cat]}</span>
                    <h3>${typeNames[cat]}</h3>
                    <div class="meta">${count} บทความ</div>
                </div>`;
            });
            
            html += '</div>';
            contentEl.innerHTML = html;
        }
        
        function renderCategory(cat) {
            let html = `<div class="back" onclick="renderLearn()">← กลับ</div>`;
            html += `<div class="section"><div class="section-header"><span class="icon">${cat === 'openclaw' ? '🦞' : cat === 'ai' ? '🤖' : cat === 'tech' ? '💻' : cat === 'trading' ? '📈' : '📋'}</span><h2>${typeNames[cat]}</h2></div>`;
            
            knowledge[cat].forEach(item => {
                html += renderCard(cat, item);
            });
            
            html += '</div>';
            contentEl.innerHTML = html;
        }
        
        // Render Cron
        function renderCron() {
            const jobs = [
                {name: "Morning Brief", time: "07:00", status: "ok", last: "5 มี.ค."},
                {name: "Midday Insight", time: "10:00", status: "ok", last: "4 มี.ค."},
                {name: "Evening Wrap", time: "19:00", status: "ok", last: "4 มี.ค."},
                {name: "Daily News", time: "06:30", status: "ok", last: "5 มี.ค."},
                {name: "Backup", time: "ทุก 8 ชม.", status: "ok", last: "5 มี.ค."},
                {name: "Price Alert", time: "ทุกชม.", status: "off", last: "ปิดแล้ว"}
            ];
            
            let html = `<div class="section"><div class="section-header"><span class="icon">⏰</span><h2>Cron Jobs</h2></div>`;
            
            jobs.forEach(job => {
                const statusClass = job.status === 'ok' ? 'status-ok' : job.status === 'off' ? 'status-off' : 'status-err';
                const statusIcon = job.status === 'ok' ? '✅' : job.status === 'off' ? '⛔' : '❌';
                html += `<div class="card" data-cat="cron">
                    <div class="meta" style="margin-bottom:4px">🕐 ${job.time}</div>
                    <h3>${job.name}</h3>
                    <div class="meta"><span class="${statusClass}">${statusIcon} ${job.last}</span></div>
                </div>`;
            });
            
            html += '</div>';
            contentEl.innerHTML = html;
        }
        
        // Render Team
        function renderTeam() {
            const history = [
                {job: "Morning Brief", time: "07:00", date: "5 มี.ค.", status: "ok", result: "ส่งรายงาน Gold+Oil เช้า | XAUUSD $5,171"},
                {job: "Evening Wrap", time: "19:00", date: "4 มี.ค.", status: "ok", result: "ส่งรายงานสรุปตลาด"},
                {job: "News Focus", time: "14:00", date: "4 มี.ค.", status: "err", result: "❌ Message delivery failed"},
                {job: "Backup", time: "03:00", date: "5 มี.ค.", status: "ok", result: "Backup เสร็จสมบูรณ์"}
            ];
            
            let html = `<div class="section"><div class="section-header"><span class="icon">👥</span><h2>ทีม & ประวัติ</h2></div>`;
            
            history.forEach(item => {
                const statusClass = item.status === 'ok' ? 'status-ok' : 'status-err';
                const statusIcon = item.status === 'ok' ? '✅' : '❌';
                html += `<div class="card" data-cat="meeting">
                    <div class="meta">🕐 ${item.time} - ${item.date}</div>
                    <h3>${item.job}</h3>
                    <div class="meta"><span class="${statusClass}">${statusIcon} ${item.status === 'ok' ? 'สำเร็จ' : 'ล้มเหลว'}</span></div>
                    <div class="meta" style="margin-top:6px;opacity:0.7">${item.result}</div>
                </div>`;
            });
            
            html += '</div>';
            contentEl.innerHTML = html;
        }
        
        // Show Article
        function showArticle(cat, title) {
            const item = knowledge[cat]?.find(i => i.title === title);
            if (!item) return;
            
            modalContent.innerHTML = `
                <span class="tag">${typeNames[cat]}</span>
                <h2>${item.title}</h2>
                <div class="meta">${item.date}</div>
                <div class="body">${item.content}</div>
            `;
            modal.classList.add('show');
        }
        
        function closeModal() { modal.classList.remove('show'); }
        
        // Nav
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const page = this.dataset.page;
                if (page === 'home') renderHome();
                else if (page === 'learn') renderLearn();
                else if (page === 'cron') renderCron();
                else if (page === 'team') renderTeam();
            });
        });
        
        renderHome();
    </script>
</body>
</html>
