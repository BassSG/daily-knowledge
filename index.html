<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Daily Knowledge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #f472b6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark-secondary: #1e293b; --dark-tertiary: #334155; --text: #f8fafc; --text-secondary: #94a3b8; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Prompt', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--dark); color: var(--text); line-height: 1.6; overscroll-behavior: none; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(244, 114, 182, 0.05) 0%, transparent 50%); pointer-events: none; z-index: -1; }
        .app-container { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%); padding: 30px 20px; text-align: center; position: relative; flex-shrink: 0; }
        .hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%); animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .hero-icon { width: 80px; height: 80px; margin: 0 auto 15px; position: relative; z-index: 1; background: rgba(255,255,255,0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .hero-icon svg { width: 50px; height: 50px; }
        .hero h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .hero p { font-size: 0.85rem; opacity: 0.95; font-weight: 300; position: relative; z-index: 1; }
        .date { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 6px 15px; border-radius: 20px; display: inline-block; margin-top: 12px; font-size: 0.8rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.3); position: relative; z-index: 1; }
        .scroll-container { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 20px 100px; }
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0 25px; }
        .category-card { background: linear-gradient(145deg, var(--dark-secondary), var(--dark-tertiary)); border-radius: 16px; padding: 15px 10px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .category-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color); opacity: 0.8; }
        .category-card:active { transform: scale(0.95); }
        .category-card .icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .category-card h3 { font-size: 0.85rem; margin-bottom: 3px; font-weight: 600; }
        .category-card p { font-size: 0.65rem; color: var(--text-secondary); }
        .category-card[data-cat="openclaw"] { --card-color: #6366f1; }
        .category-card[data-cat="ai"] { --card-color: #ec4899; }
        .category-card[data-cat="tech"] { --card-color: #06b6d4; }
        .category-card[data-cat="trading"] { --card-color: #10b981; }
        .category-card[data-cat="cron"] { --card-color: #f59e0b; }
        .category-card[data-cat="history"] { --card-color: #ef4444; }
        .section { margin-bottom: 25px; }
        .section-title { font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .section-title .icon { font-size: 1.2rem; }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--primary), transparent); border-radius: 2px; }
        .article-card { background: linear-gradient(145deg, var(--dark-secondary), var(--dark)); border-radius: 14px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .article-card:active { transform: scale(0.98); }
        .article-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--tag-color, var(--primary)); opacity: 0.7; }
        .article-card .tag { background: linear-gradient(135deg, var(--tag-color, var(--primary)), var(--tag-color-darker, var(--primary-dark))); padding: 4px 12px; border-radius: 15px; font-size: 0.65rem; font-weight: 500; display: inline-block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .article-card[data-cat="openclaw"] { --tag-color: #6366f1; --tag-color-darker: #4f46e5; }
        .article-card[data-cat="ai"] { --tag-color: #ec4899; --tag-color-darker: #db2777; }
        .article-card[data-cat="tech"] { --tag-color: #06b6d4; --tag-color-darker: #0891b2; }
        .article-card[data-cat="trading"] { --tag-color: #10b981; --tag-color-darker: #059669; }
        .article-card[data-cat="cron"] { --tag-color: #f59e0b; --tag-color-darker: #d97706; }
        .article-card[data-cat="history"] { --tag-color: #ef4444; --tag-color-darker: #dc2626; }
        .article-card h4 { font-size: 0.9rem; margin-bottom: 8px; line-height: 1.4; font-weight: 500; }
        .article-card .meta { font-size: 0.7rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
        .article-card .meta .dot { width: 3px; height: 3px; background: var(--text-secondary); border-radius: 50%; }
        .status-ok { color: var(--success) !important; }
        .status-error { color: var(--danger) !important; }
        .status-disabled { color: var(--text-secondary) !important; }
        .cron-time { font-size: 0.75rem; color: var(--warning); font-weight: 600; margin-bottom: 5px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 5px 25px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .bottom-nav-item { text-align: center; cursor: pointer; opacity: 0.5; transition: all 0.3s; padding: 8px 12px; border-radius: 12px; flex: 1; }
        .bottom-nav-item:active { opacity: 1; background: rgba(99, 102, 241, 0.2); }
        .bottom-nav-item .icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }
        .bottom-nav-item span { font-size: 0.65rem; font-weight: 500; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; backdrop-filter: blur(10px); }
        .modal.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 40px; }
        .modal-close { position: fixed; top: 15px; right: 15px; width: 35px; height: 35px; background: var(--dark-secondary); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 201; }
        .modal-close:active { background: var(--danger); transform: scale(0.9); }
        .article-full h2 { font-size: 1.4rem; margin-bottom: 12px; line-height: 1.4; font-weight: 600; }
        .article-full .meta { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }
        .article-full .content { line-height: 1.8; font-size: 0.95rem; }
        .article-full .content p { margin-bottom: 15px; color: var(--text); }
        .article-full .content strong { color: var(--primary); }
        .empty-state { text-align: center; padding: 40px 20px; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        .empty-state p { color: var(--text-secondary); font-size: 0.9rem; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--primary); font-size: 0.85rem; cursor: pointer; margin-bottom: 15px; transition: all 0.3s; }
        .back-btn:active { color: var(--accent); transform: translateX(-3px); }
        .cron-group { margin-bottom: 20px; }
        .cron-group-title { font-size: 0.9rem; color: var(--warning); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .history-card { border-left-color: var(--tag-color) !important; }
        .history-time { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 5px; }
        .history-result { font-size: 0.8rem; margin-top: 8px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .loading { text-align: center; padding: 20px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="hero">
            <div class="hero-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="url(#g)"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white">🦞</text></svg></div>
            <h1>Daily Knowledge</h1>
            <p>ความรู้ใหม่ทุกวัน</p>
            <div class="date" id="currentDate">Loading...</div>
        </div>
        <div class="scroll-container" id="mainContent">
            <div class="category-grid" id="categoryGrid">
                <div class="category-card" data-cat="openclaw" onclick="showCategory('openclaw')"><span class="icon">🦞</span><h3>OpenClaw</h3><p>อัปเดตระบบ</p></div>
                <div class="category-card" data-cat="ai" onclick="showCategory('ai')"><span class="icon">🤖</span><h3>AI</h3><p>ข่าว AI</p></div>
                <div class="category-card" data-cat="tech" onclick="showCategory('tech')"><span class="icon">💻</span><h3>Tech</h3><p>เทคโนโลยี</p></div>
                <div class="category-card" data-cat="trading" onclick="showCategory('trading')"><span class="icon">📈</span><h3>Trading</h3><p>เทรด</p></div>
                <div class="category-card" data-cat="cron" onclick="showCronJobs()"><span class="icon">⏰</span><h3>Cron</h3><p>ตารางงาน</p></div>
                <div class="category-card" data-cat="history" onclick="showHistory()"><span class="icon">📊</span><h3>ประวัติ</h3><p>รายงาน</p></div>
            </div>
            <div class="section"><h2 class="section-title"><span class="icon">🔥</span>ข่าวล่าสุด</h2><div id="latestArticles"><div class="loading">กำลังโหลด...</div></div></div>
        </div>
        <nav class="bottom-nav">
            <div class="bottom-nav-item active" onclick="goHome()"><span class="icon">🏠</span><span>หน้าหลัก</span></div>
            <div class="bottom-nav-item" onclick="showCategories()"><span class="icon">📚</span><span>หมวดหมู่</span></div>
            <div class="bottom-nav-item" onclick="showSaved()"><span class="icon">🔖</span><span>บันทึก</span></div>
            <div class="bottom-nav-item" onclick="showSettings()"><span class="icon">⚙️</span><span>ตั้งค่า</span></div>
        </nav>
    </div>
    <div class="modal" id="articleModal"><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-content article-full" id="modalContent"></div></div>
    <script>
        const date = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').textContent = date.toLocaleDateString('th-TH', options);
        
        let newsData = {openclaw: [], ai: [], tech: [], trading: []};
        
        // ดึงข่าวจาก localStorage ก่อน
        function loadCachedNews() {
            try {
                const cached = localStorage.getItem('dailyKnowledgeNews');
                if (cached) {
                    const data = JSON.parse(cached);
                    const now = Date.now();
                    if (now - data.timestamp < 3600000) { // 1 ชั่วโมง
                        newsData = data.articles;
                        renderNews();
                        return true;
                    }
                }
            } catch(e) {}
            return false;
        }
        
        function renderNews() {
            let allArticles = [];
            Object.keys(newsData).forEach(cat => {
                newsData[cat].forEach((art, idx) => {
                    allArticles.push({...art, category: cat, index: idx});
                });
            });
            allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
            const latest = allArticles.slice(0, 5);
            document.getElementById('latestArticles').innerHTML = latest.map(a => createArticleCard(a, a.category, a.index)).join('');
        }
        
        function createArticleCard(article, category, index) {
            return '<div class="article-card" data-cat="' + category + '" onclick="showArticle(\'' + category + '\',' + index + ')"><span class="tag">' + categoryNames[category].name + '</span><h4>' + article.title + '</h4><div class="meta"><span>' + article.date + '</span><span class="dot"></span><span>' + article.readTime + '</span></div></div>';
        }
        
        // ข้อมูลเริ่มต้น
        const articles = {
            openclaw: [{title: "OpenClaw v2026.3.2 มีอะไรใหม่?", date: "5 มี.ค. 2026", readTime: "3 นาที", content: "<p><strong>🎉 อัปเดตใหม่!</strong> OpenClaw เวอร์ชัน 2026.3.2</p><p><strong>📄 PDF Analysis Tool</strong><br>วิเคราะห์ PDF ได้เลย!</p><p><strong>🐛 150+ Bug Fixes</strong><br>แก้บักมากมาย</p>"}],
            ai: [{title: "AI Agents คืออะไร?", date: "5 มี.ค. 2026", readTime: "4 นาที", content: "<p><strong>🤖 AI Agents</strong><br>AI ทำงานแทนเราได้</p><p><strong>💡 ตัวอย่าง</strong><br>• หาข่าว • ทำรายงาน</p>"}],
            tech: [{title: "Windows Server 2022 vs Windows 10", date: "4 มี.ค. 2026", readTime: "3 นาที", content: "<p><strong>🖥️ Server 2022</strong> - เสถียรสูง</p><p><strong>🖥️ Windows 10/11</strong> - ใช้ง่าย</p>"}],
            trading: [{title: "Windows Server + MT5 + FTMO", date: "4 มี.ค. 2026", readTime: "4 นาที", content: "<p><strong>✅ ใช้ได้!</strong><br>Server 2022 รัน MT5 ได้</p><p><strong>📋 ความต้องการ</strong><br>• Windows 10/11/Server 2019/2022<br>• RAM 4GB+</p>"}]
        };
        
        // รวมข้อมูล
        Object.keys(articles).forEach(cat => {
            if (!newsData[cat]) newsData[cat] = [];
            if (newsData[cat].length === 0) newsData[cat] = articles[cat];
        });
        
        renderNews();
        
        const cronJobs = [
            {name: "Morning Brief", time: "07:00", period: "เช้า", status: "ok", lastRun: "5 มี.ค. 2026"},
            {name: "Midday Insight", time: "10:00", period: "เช้า", status: "ok", lastRun: "4 มี.ค. 2026"},
            {name: "Evening Wrap", time: "19:00", period: "ค่ำ", status: "ok", lastRun: "4 มี.ค. 2026"},
            {name: "Backup System", time: "ทุก 8 ชม.", period: "all", status: "ok", lastRun: "5 มี.ค. 2026"},
            {name: "Price Alert", time: "ทุกชม.", period: "all", status: "disabled", lastRun: "4 มี.ค. 2026"}
        ];
        
        const jobHistory = [
            {job: "Morning Brief", time: "07:00", date: "5 มี.ค. 2026", status: "ok", result: "ส่งรายงาน Gold+Oil เช้าสำเร็จ | ราคา: XAUUSD $5,171"},
            {job: "Evening Wrap", time: "19:00", date: "4 มี.ค. 2026", status: "ok", result: "ส่งรายงานสรุปตลาดประจำวันสำเร็จ"},
            {job: "Backup System", time: "03:00", date: "5 มี.ค. 2026", status: "ok", result: "Backup เสร็จสมบูรณ์"}
        ];
        
        const categoryNames = {openclaw: {name: 'OpenClaw', icon: '🦞'}, ai: {name: 'AI', icon: '🤖'}, tech: {name: 'Tech', icon: '💻'}, trading: {name: 'Trading', icon: '📈'}};
        
        function showHistory() {
            let html = '<div class="back-btn" onclick="goHome()">← กลับ</div><h2 class="section-title"><span class="icon">📊</span>ประวัติงาน</h2>';
            jobHistory.forEach(item => {
                const statusClass = item.status === 'ok' ? 'status-ok' : 'status-error';
                const statusIcon = item.status === 'ok' ? '✅' : '❌';
                html += '<div class="article-card history-card" data-cat="history"><div class="history-time">🕐 ' + item.time + ' - ' + item.date + '</div><h4>' + item.job + '</h4><div class="meta"><span class="' + statusClass + '">' + statusIcon + ' ' + (item.status === 'ok' ? 'สำเร็จ' : 'ล้มเหลว') + '</span></div><div class="history-result">' + item.result + '</div></div>';
            });
            document.getElementById('mainContent').innerHTML = html;
        }
        
        function showCronJobs() {
            const groups = {'เช้า (06:00-12:00)': [], 'ค่ำ (18:00-00:00)': [], 'ทุกชั่วโมง': []};
            cronJobs.forEach(job => {
                if (job.time.includes('ชม')) groups['ทุกชั่วโมง'].push(job);
                else if (job.period === 'เช้า') groups['เช้า (06:00-12:00)'].push(job);
                else groups['ค่ำ (18:00-00:00)'].push(job);
            });
            let html = '<div class="back-btn" onclick="goHome()">← กลับ</div><h2 class="section-title"><span class="icon">⏰</span>Cron Jobs</h2>';
            Object.keys(groups).forEach(period => {
                if (groups[period].length > 0) {
                    html += '<div class="cron-group"><div class="cron-group-title">' + period + '</div>';
                    groups[period].forEach(job => {
                        const statusClass = job.status === 'ok' ? 'status-ok' : job.status === 'error' ? 'status-error' : 'status-disabled';
                        const statusIcon = job.status === 'ok' ? '✅' : job.status === 'error' ? '❌' : '⛔';
                        html += '<div class="article-card" data-cat="cron"><div class="cron-time">🕐 ' + job.time + '</div><h4>' + job.name + '</h4><div class="meta"><span class="' + statusClass + '">' + statusIcon + ' ' + (job.status === 'ok' ? 'ทำงาน' : 'ปิด') + '</span><span class="dot"></span><span>' + job.lastRun + '</span></div></div>';
                    });
                    html += '</div>';
                }
            });
            document.getElementById('mainContent').innerHTML = html;
        }
        
        function showCategory(category) {
            const cat = categoryNames[category];
            let html = '<div class="back-btn" onclick="goHome()">← กลับ</div><h2 class="section-title"><span class="icon">' + cat.icon + '</span>' + cat.name + '</h2>';
            if (newsData[category]) newsData[category].forEach((article, index) => { html += createArticleCard(article, category, index); });
            document.getElementById('mainContent').innerHTML = html;
        }
        
        function showArticle(category, index) {
            const article = newsData[category][index];
            document.getElementById('modalContent').innerHTML = '<span class="tag">' + categoryNames[category].name + '</span><h2>' + article.title + '</h2><div class="meta"><span>' + article.date + '</span><span class="dot"></span><span>' + article.readTime + ' อ่าน</span></div><div class="content">' + article.content + '</div>';
            document.getElementById('articleModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() { document.getElementById('articleModal').classList.remove('show'); document.body.style.overflow = ''; }
        function goHome() { location.reload(); }
        
        function showCategories() {
            document.getElementById('mainContent').innerHTML = '<div class="category-grid">' + Object.keys(categoryNames).map(cat => '<div class="category-card" data-cat="' + cat + '" onclick="showCategory(\'' + cat + '\')"><span class="icon">' + categoryNames[cat].icon + '</span><h3>' + categoryNames[cat].name + '</h3><p>' + (newsData[cat]?.length || 0) + ' ข่าว</p></div>').join('') + '<div class="category-card" data-cat="cron" onclick="showCronJobs()"><span class="icon">⏰</span><h3>Cron</h3><p>' + cronJobs.length + ' งาน</p></div><div class="category-card" data-cat="history" onclick="showHistory()"><span class="icon">📊</span><h3>ประวัติ</h3><p>' + jobHistory.length + ' รายการ</p></div></div>';
        }
        
        function showSaved() { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">🔖</div><p>ยังไม่มีบทความที่บันทึก</p></div>'; }
        
        function showSettings() { document.getElementById('mainContent').innerHTML = '<div class="section"><h2 class="section-title"><span class="icon">⚙️</span>ตั้งค่า</h2><div class="article-card"><h4>🔔 แจ้งเตือน</h4><div class="meta">เปิด/ปิดการแจ้งเตือนข่าวใหม่</div></div><div class="article-card"><h4>🌙 ธีม</h4><div class="meta">มืด / สว่าง</div></div><div class="article-card"><h4>🔄 อัปเดตข้อมูล</h4><div class="meta">ดึงข่าวใหม่ล่าสุด</div></div></div>'; }
        
        document.getElementById('articleModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
