<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Daily Knowledge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #6366f1; --secondary: #8b5cf6; --accent: #f472b6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark2: #1e293b; --dark3: #334155; --text: #f8fafc; --text2: #94a3b8; }
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Prompt', sans-serif; background: var(--dark); color: var(--text); }
        
        /* Layout */
        .app { height: 100%; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 20px; text-align: center; flex-shrink: 0; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
        .header-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .header h1 { font-size: 1.4rem; font-weight: 600; }
        .header p { font-size: 0.8rem; opacity: 0.9; }
        .header .date { display: inline-block; margin-top: 8px; padding: 4px 12px; background: rgba(255,255,255,0.2); border-radius: 20px; font-size: 0.75rem; }
        
        /* Scroll */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
        
        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .menu-item { background: var(--dark2); border-radius: 16px; padding: 15px 10px; text-align: center; transition: 0.2s; border: 1px solid transparent; }
        .menu-item:active { transform: scale(0.95); background: var(--dark3); }
        .menu-item.active { border-color: var(--primary); background: var(--dark3); }
        .menu-item .icon { font-size: 24px; margin-bottom: 6px; }
        .menu-item .label { font-size: 0.75rem; font-weight: 500; }
        
        /* Section */
        .section { margin-bottom: 20px; }
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .section-header .icon { font-size: 18px; }
        .section-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
        .section-header .more { font-size: 0.75rem; color: var(--text2); }
        
        /* Cards */
        .card { background: var(--dark2); border-radius: 14px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--primary); transition: 0.2s; }
        .card:active { transform: scale(0.98); }
        .card .tag { display: inline-block; padding: 3px 10px; background: var(--primary); border-radius: 12px; font-size: 0.65rem; font-weight: 500; margin-bottom: 8px; }
        .card h3 { font-size: 0.9rem; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
        .card .meta { font-size: 0.7rem; color: var(--text2); }
        
        /* Colors */
        .card[data-type="openclaw"] { border-left-color: #6366f1; }
        .card[data-type="openclaw"] .tag { background: #6366f1; }
        .card[data-type="ai"] { border-left-color: #ec4899; }
        .card[data-type="ai"] .tag { background: #ec4899; }
        .card[data-type="tech"] { border-left-color: #06b6d4; }
        .card[data-type="tech"] .tag { background: #06b6d4; }
        .card[data-type="trading"] { border-left-color: #10b981; }
        .card[data-type="trading"] .tag { background: #10b981; }
        .card[data-type="cron"] { border-left-color: #f59e0b; }
        .card[data-type="cron"] .tag { background: #f59e0b; }
        
        /* Status */
        .status-ok { color: var(--success); }
        .status-err { color: var(--danger); }
        .status-off { color: var(--text2); }
        
        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark2); display: flex; padding: 8px 10px 25px; border-top: 1px solid var(--dark3); }
        .nav-item { flex: 1; text-align: center; padding: 8px; opacity: 0.5; transition: 0.2s; }
        .nav-item:active { opacity: 1; }
        .nav-item.active { opacity: 1; }
        .nav-item .icon { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 0.65rem; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; }
        .modal.show { display: block; }
        .modal-content { padding: 20px; max-width: 500px; margin: 0 auto; }
        .modal-close { position: fixed; top: 15px; right: 15px; width: 35px; height: 35px; background: var(--dark2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 10px; }
        .modal .meta { font-size: 0.8rem; color: var(--text2); margin-bottom: 15px; }
        .modal .content { font-size: 0.95rem; line-height: 1.7; }
        .modal .content p { margin-bottom: 12px; }
        
        /* Back */
        .back { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.85rem; margin-bottom: 15px; }
        
        /* Empty */
        .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
        .empty .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="header-top">
                <div class="header-icon">🦞</div>
                <h1>Daily Knowledge</h1>
            </div>
            <p>ความรู้ใหม่ทุกวัน</p>
            <div class="date" id="date">Loading...</div>
        </div>
        
        <div class="content" id="content">
            <!-- Content loaded by JS -->
        </div>
        
        <nav class="nav">
            <div class="nav-item active" data-page="home"><span class="icon">🏠</span><span>หน้าหลัก</span></div>
            <div class="nav-item" data-page="categories"><span class="icon">📚</span><span>หมวดหมู่</span></div>
            <div class="nav-item" data-page="cron"><span class="icon">⏰</span><span>งาน</span></div>
            <div class="nav-item" data-page="history"><span class="icon">📊</span><span>ประวัติ</span></div>
        </nav>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-close" onclick="closeModal()">✕</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const dateEl = document.getElementById('date');
        const contentEl = document.getElementById('content');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        
        const today = new Date();
        dateEl.textContent = today.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        // ข้อมูล
        const data = {
            openclaw: [
                {title: "OpenClaw v2026.3.2", date: "5 มี.ค. 2026", content: "<p><strong>📄 PDF Analysis Tool</strong><br>วิเคราะห์ PDF ได้เลย</p><p><strong>🐛 150+ Bug Fixes</strong><br>แก้บักมากมาย</p><p><strong>🔐 Secrets</strong><br>รองรับ 64 targets</p>"},
                {title: "วิธีใช้ Minimax", date: "4 มี.ค. 2026", content: "<p>Minimax เป็นโมเดล AI หลักที่ Jarvis ใช้<br>✓ ราคาถูก ✓ ตอบเร็ว ✓ ภาษาไทยดี</p>"}
            ],
            ai: [
                {title: "AI Agents คืออะไร?", date: "5 มี.ค. 2026", content: "<p>AI Agents คือ AI ที่ทำงานแทนเราได้อัตโนมัติ<br>เช่น สั่งหาข่าว ทำรายงาน จัดการงาน</p>"},
                {title: "Claude vs GPT vs Gemini", date: "3 มี.ค. 2026", content: "<p><strong>Claude</strong> - ความปลอดภัย<br><strong>GPT</strong> - ใช้ง่าย<br><strong>Gemini</strong> - Multimodal</p>"}
            ],
            tech: [
                {title: "Windows Server 2022 vs 10", date: "4 มี.ค. 2026", content: "<p><strong>Server 2022</strong> - เสถียรสูง รัน 24/7<br><strong>Windows 10/11</strong> - ใช้ง่าย ถูกกว่า</p>"},
                {title: "Obsidian คืออะไร?", date: "4 มี.ค. 2026", content: "<p>App เขียนโน้ต + จัดการความรู้<br>เน้น Text + เชื่อมโยงความคิด<br>ฟรีสำหรับใช้งานส่วนตัว</p>"}
            ],
            trading: [
                {title: "Windows Server + MT5 + FTMO", date: "4 มี.ค. 2026", content: "<p>✅ ใช้ได้!<br>Server 2022 รัน MT5 เทรด FTMO ได้<br><br><strong>ความต้องการ:</strong><br>• Windows 10/11/Server 2019/2022<br>• RAM 4GB+ • CPU 2 cores+</p>"}
            ],
            cron: [
                {name: "Morning Brief", time: "07:00", status: "ok", last: "5 มี.ค."},
                {name: "Midday Insight", time: "10:00", status: "ok", last: "4 มี.ค."},
                {name: "Evening Wrap", time: "19:00", status: "ok", last: "4 มี.ค."},
                {name: "Daily News", time: "06:30", status: "ok", last: "5 มี.ค."},
                {name: "Backup", time: "ทุก 8 ชม.", status: "ok", last: "5 มี.ค."},
                {name: "Price Alert", time: "ทุกชม.", status: "off", last: "ปิดแล้ว"}
            ],
            history: [
                {job: "Morning Brief", time: "07:00", date: "5 มี.ค.", status: "ok", result: "ส่งรายงาน Gold+Oil เช้าสำเร็จ | ราคา: XAUUSD $5,171"},
                {job: "Evening Wrap", time: "19:00", date: "4 มี.ค.", status: "ok", result: "ส่งรายงานสรุปตลาดประจำวันสำเร็จ"},
                {job: "News Focus", time: "14:00", date: "4 มี.ค.", status: "err", result: "❌ Message delivery failed"},
                {job: "Backup", time: "03:00", date: "5 มี.ค.", status: "ok", result: "Backup เสร็จสมบูรณ์"}
            ]
        };
        
        const typeNames = {openclaw: 'OpenClaw', ai: 'AI', tech: 'Tech', trading: 'Trading'};
        
        // Render Home
        function renderHome() {
            let html = `
                <div class="section">
                    <div class="section-header"><span class="icon">🔥</span><h2>ข่าวล่าสุด</h2></div>
            `;
            
            // รวมข่าวทุกหมวด
            const allNews = [
                ...data.openclaw.map(i => ({...i, type: 'openclaw'})),
                ...data.ai.map(i => ({...i, type: 'ai'})),
                ...data.tech.map(i => ({...i, type: 'tech'})),
                ...data.trading.map(i => ({...i, type: 'trading'}))
            ];
            
            allNews.slice(0, 4).forEach(item => {
                html += `<div class="card" data-type="${item.type}" onclick="showArticle('${item.type}', '${item.title}')">
                    <span class="tag">${typeNames[item.type]}</span>
                    <h3>${item.title}</h3>
                    <div class="meta">${item.date}</div>
                </div>`;
            });
            
            html += `</div>`;
            contentEl.innerHTML = html;
        }
        
        // Render Categories
        function renderCategories() {
            let html = `
                <div class="section">
                    <div class="section-header"><span class="icon">📚</span><h2>หมวดหมู่</h2></div>
            `;
            
            ['openclaw', 'ai', 'tech', 'trading'].forEach(cat => {
                const count = data[cat].length;
                html += `<div class="card" data-type="${cat}" onclick="showCategory('${cat}')">
                    <span class="tag">${typeNames[cat]}</span>
                    <h3>${typeNames[cat]}</h3>
                    <div class="meta">${count} บทความ</div>
                </div>`;
            });
            
            html += `</div>`;
            contentEl.innerHTML = html;
        }
        
        // Render Category Detail
        function showCategory(cat) {
            let html = `<div class="back" onclick="renderCategories()">← กลับ</div>`;
            html += `<div class="section"><div class="section-header"><span class="icon">${cat === 'openclaw' ? '🦞' : cat === 'ai' ? '🤖' : cat === 'tech' ? '💻' : '📈'}</span><h2>${typeNames[cat]}</h2></div>`;
            
            data[cat].forEach(item => {
                html += `<div class="card" data-type="${cat}" onclick="showArticle('${cat}', '${item.title}')">
                    <h3>${item.title}</h3>
                    <div class="meta">${item.date}</div>
                </div>`;
            });
            
            html += `</div>`;
            contentEl.innerHTML = html;
        }
        
        // Show Article
        function showArticle(type, title) {
            const item = data[type].find(i => i.title === title);
            if (!item) return;
            
            modalContent.innerHTML = `
                <span class="tag">${typeNames[type]}</span>
                <h2>${item.title}</h2>
                <div class="meta">${item.date}</div>
                <div class="content">${item.content}</div>
            `;
            modal.classList.add('show');
        }
        
        // Render Cron
        function renderCron() {
            let html = `
                <div class="section">
                    <div class="section-header"><span class="icon">⏰</span><h2>Cron Jobs</h2></div>
            `;
            
            data.cron.forEach(item => {
                const statusClass = item.status === 'ok' ? 'status-ok' : item.status === 'err' ? 'status-err' : 'status-off';
                const statusText = item.status === 'ok' ? '✅' : item.status === 'err' ? '❌' : '⛔';
                html += `<div class="card" data-type="cron">
                    <div class="meta" style="margin-bottom:4px">🕐 ${item.time}</div>
                    <h3>${item.name}</h3>
                    <div class="meta"><span class="${statusClass}">${statusText} ${item.last}</span></div>
                </div>`;
            });
            
            html += `</div>`;
            contentEl.innerHTML = html;
        }
        
        // Render History
        function renderHistory() {
            let html = `
                <div class="section">
                    <div class="section-header"><span class="icon">📊</span><h2>ประวัติงาน</h2></div>
            `;
            
            data.history.forEach(item => {
                const statusClass = item.status === 'ok' ? 'status-ok' : 'status-err';
                const statusText = item.status === 'ok' ? '✅' : '❌';
                html += `<div class="card" data-type="cron">
                    <div class="meta">🕐 ${item.time} - ${item.date}</div>
                    <h3>${item.job}</h3>
                    <div class="meta" style="margin-top:6px"><span class="${statusClass}">${statusText} ${item.status === 'ok' ? 'สำเร็จ' : 'ล้มเหลว'}</span></div>
                    <div class="meta" style="margin-top:4px;opacity:0.7">${item.result}</div>
                </div>`;
            });
            
            html += `</div>`;
            contentEl.innerHTML = html;
        }
        
        function closeModal() { modal.classList.remove('show'); }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                const page = this.dataset.page;
                if (page === 'home') renderHome();
                else if (page === 'categories') renderCategories();
                else if (page === 'cron') renderCron();
                else if (page === 'history') renderHistory();
            });
        });
        
        // Init
        renderHome();
    </script>
</body>
</html>
